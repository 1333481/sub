<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Subway Counter</title>
        <link rel="stylesheet" href="style.css">
        <script src="main.js"></script>
        <script type="module">
            import "https://esm.run/@material/web/all.js"
        </script>
    </head>
    <body>
        <header class="pageTitle">
            <h1>Subway Counter</h1>
        </header>
        <nav id="nav">
            <ul>
                <li><a href="#breadCount">Bread Count</a></li>
                <li><a href="#drawerCount">Drawer Count</a></li>
            </ul>
        </nav>
        <div class="section">
            <h2 class="sectionHeader" id="breadCount">Bread Count</h2>
            <h3>Freezer</h3>
            <md-outlined-text-field id="freezerBreadBox" label="Bread Boxes" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="freezerBreadOpen" label="Open Bread" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="freezerFlatBox" label="Flatbread Boxes" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="freezerFlatBag" label="Flatbread Bags" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="freezerWrapBox" label="Wrap Boxes" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="freezerWrapBag" label="Wrap Bags" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="freezerPocketBox" label="Pocket Boxes" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="freezerPocketBag" label="Pocket Bags" type="number"></md-outlined-text-field>
            <h3>Back Room</h3>
            <md-outlined-text-field id="backSalad" label="Salad Bowls" type="number"></md-outlined-text-field>
            <h3>Front</h3>
            <md-outlined-text-field id="frontBread" label="Bread" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="frontFlatBag" label="Flatbread Bags" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="frontFlat" label="Flatbread" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="frontSalad" label="Salad Bowls" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="frontWrapBag" label="Wrap Bags" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="frontPocketBag" label="Pocket Bags" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="frontWrap" label="Open Wraps & Pockets" type="number"></md-outlined-text-field>
            <md-filled-button onclick="calcCountTotals();">Submit</md-filled-button>
            <p id="countTextArea" class="textArea"></p>
        </div>
        <div class="section">
            <h2 class="sectionHeader" id="drawerCount">Drawer Count</h2>
            <h3>Change</h3>
            <md-outlined-text-field id="quarters1" label="Quarters #1" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="dimes1" label="Dimes #1" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="pennies1" label="Pennies #1" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="pennies2" label="Pennies #2" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="pennies3" label="Pennies #3" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="nickels" label="Nickels" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="dimes2" label="Dimes #2" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="quarters2" label="Quarters #2" type="number"></md-outlined-text-field>
            <h3>Cash</h3>
            <md-outlined-text-field id="twenties" label="Twenties" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="tens" label="Tens" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="fives" label="Fives" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="ones" label="Ones" type="number"></md-outlined-text-field>
            <h3>Variables</h3>
            <md-outlined-text-field id="cashKeep" label="Cash to Keep" type="number"></md-outlined-text-field>
            <md-outlined-text-field id="changeFund" label="Change Fund" type="number"></md-outlined-text-field>
            <md-filled-button onclick="calcCashTotals();">Submit</md-filled-button>
            <p id="cashTextArea" class="textArea"></p>
        </div>
    </body>
</html>
