<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Subway Counter</title>
        <script src="main.js"></script>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1 class="pageHeader">Subway Counter</h1>
        <h2>Freezer</h2>
        <label>
            Bread Boxes
            <input type="number" class="subInput" name="" id="freezerBreadBox">
        </label>
        <br>
        <label>
            Open Bread
            <input type="number" class="subInput" name="" id="freezerBreadOpen">
        </label>
        <br>
        <label>
            Flatbread Boxes
            <input type="number" class="subInput" name="" id="freezerFlatBox">
        </label>
        <br>
        <label>
            Flatbread Bags
            <input type="number" class="subInput" name="" id="freezerFlatBag">
        </label>
        <br>
        <label>
            Wrap Boxes
            <input type="number" class="subInput" name="" id="freezerWrapBox">
        </label>
        <br>
        <label>
            Wrap Bags
            <input type="number" class="subInput" name="" id="freezerWrapBag">
        </label>
        <br>
        <label>
            Pocket Boxes
            <input type="number" class="subInput" name="" id="freezerPocketBox">
        </label>
        <br>
        <label>
            Pocket Bags
            <input type="number" class="subInput" name="" id="freezerPocketBag">
        </label>
        <br>
        <h2>Back Room</h2>
        <label>
            Salad Bowls
            <input type="number" class="subInput" name="" id="backSalad">
        </label>
        <br>
        <h2>Front</h2>
        <label>
            Bread
            <input type="number" class="subInput" name="" id="frontBread">
        </label>
        <br>
        <label>
            Flatbread
            <input type="number" class="subInput" name="" id="frontFlat">
        </label>
        <br>
        <label>
            Salad Bowls
            <input type="number" class="subInput" name="" id="frontSalad">
        </label>
        <br>
        <label>
            Wraps
            <input type="number" class="subInput" name="" id="frontWraps">
        </label>
        <br>
        <br>
        <button type="button" onclick="calcTotals();">Submit</button>
    </body>
</html>
